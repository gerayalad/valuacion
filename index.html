<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valuación de Puestos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        header h1 {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #1a56db;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        header p {
            color: #666;
            font-size: 0.95rem;
        }

        .form-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 24px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #444;
            font-size: 0.9rem;
        }

        .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .icon svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        header .icon svg {
            width: 28px;
            height: 28px;
            stroke: #1a56db;
        }

        .btn-calculate .icon svg {
            width: 18px;
            height: 18px;
            stroke: #fff;
        }

        .results-card h2 .icon svg {
            width: 22px;
            height: 22px;
            stroke: #1a56db;
        }

        .classification .icon svg {
            width: 28px;
            height: 28px;
            stroke: currentColor;
            margin-bottom: 4px;
        }

        .form-group .weight-badge {
            font-weight: 400;
            color: #888;
            font-size: 0.8rem;
        }

        .form-group input[type="text"],
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95rem;
            color: #333;
            background: #fafafa;
            transition: border-color 0.2s;
        }

        .form-group input[type="text"]:focus,
        .form-group select:focus {
            outline: none;
            border-color: #1a56db;
            background: #fff;
        }

        .btn-calculate {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            background-color: #1a56db;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-calculate:hover {
            background-color: #1444b0;
        }

        .results {
            display: none;
        }

        .results.visible {
            display: block;
        }

        .results-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 24px;
        }

        .results-card h2 {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1a56db;
            font-size: 1.3rem;
            margin-bottom: 4px;
        }

        .results-card .puesto-name {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        thead th {
            background-color: #f0f4ff;
            color: #1a56db;
            padding: 10px 12px;
            text-align: left;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tbody td {
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tfoot td {
            padding: 12px;
            font-weight: 700;
            font-size: 1rem;
            border-top: 2px solid #1a56db;
        }

        .classification {
            text-align: center;
            padding: 16px;
            border-radius: 6px;
            margin-top: 8px;
        }

        .classification .label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .classification .band {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .band-operativo {
            background-color: #ecfdf5;
            color: #059669;
        }

        .band-profesional {
            background-color: #eff6ff;
            color: #1a56db;
        }

        .band-gerencial {
            background-color: #fff7ed;
            color: #d97706;
        }

        .band-directivo {
            background-color: #fef2f2;
            color: #dc2626;
        }

        @media (max-width: 600px) {
            .container {
                padding: 12px;
            }

            header h1 {
                font-size: 1.4rem;
            }

            .form-card, .results-card {
                padding: 16px;
            }

            thead th, tbody td, tfoot td {
                padding: 8px 6px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span class="icon"><svg viewBox="0 0 24 24"><path d="M12 3v18"/><path d="M4 7h16"/><path d="M4 7l3 8a4 4 0 0 0 4-4"/><path d="M20 7l-3 8a4 4 0 0 1-4-4"/><circle cx="12" cy="3" r="1"/></svg></span>Valuación de Puestos</h1>
            <p>Método de puntos por factor — Evalúe el puesto en cada factor compensable</p>
        </header>

        <div class="form-card">
            <form id="valuationForm">
                <div class="form-group">
                    <label for="puestoName"><span class="icon"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a4 4 0 0 0-8 0v2"/></svg></span>Nombre del Puesto</label>
                    <input type="text" id="puestoName" placeholder="Ej: Gerente de Operaciones" required>
                </div>

                <div class="form-group">
                    <label for="factor-0"><span class="icon"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span>Responsabilidad <span class="weight-badge">(20%)</span></label>
                    <select id="factor-0" required>
                        <option value="" disabled selected>Seleccione un nivel</option>
                        <option value="1">1 - Bajo</option>
                        <option value="2">2 - Medio</option>
                        <option value="3">3 - Alto</option>
                        <option value="4">4 - Muy Alto</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="factor-1"><span class="icon"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></span>Complejidad del trabajo <span class="weight-badge">(15%)</span></label>
                    <select id="factor-1" required>
                        <option value="" disabled selected>Seleccione un nivel</option>
                        <option value="1">1 - Bajo</option>
                        <option value="2">2 - Medio</option>
                        <option value="3">3 - Alto</option>
                        <option value="4">4 - Muy Alto</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="factor-2"><span class="icon"><svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 2 3 3 6 3s6-1 6-3v-5"/></svg></span>Conocimientos y habilidades requeridos <span class="weight-badge">(15%)</span></label>
                    <select id="factor-2" required>
                        <option value="" disabled selected>Seleccione un nivel</option>
                        <option value="1">1 - Bajo</option>
                        <option value="2">2 - Medio</option>
                        <option value="3">3 - Alto</option>
                        <option value="4">4 - Muy Alto</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="factor-3"><span class="icon"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>Supervisión ejercida/recibida <span class="weight-badge">(10%)</span></label>
                    <select id="factor-3" required>
                        <option value="" disabled selected>Seleccione un nivel</option>
                        <option value="1">1 - Bajo</option>
                        <option value="2">2 - Medio</option>
                        <option value="3">3 - Alto</option>
                        <option value="4">4 - Muy Alto</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="factor-4"><span class="icon"><svg viewBox="0 0 24 24"><path d="M2 20h20"/><path d="M5 20V8l7-5 7 5v12"/><path d="M9 20v-5h6v5"/><path d="M9 12h.01M15 12h.01"/></svg></span>Condiciones de trabajo <span class="weight-badge">(5%)</span></label>
                    <select id="factor-4" required>
                        <option value="" disabled selected>Seleccione un nivel</option>
                        <option value="1">1 - Bajo</option>
                        <option value="2">2 - Medio</option>
                        <option value="3">3 - Alto</option>
                        <option value="4">4 - Muy Alto</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="factor-5"><span class="icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg></span>Toma de decisiones <span class="weight-badge">(15%)</span></label>
                    <select id="factor-5" required>
                        <option value="" disabled selected>Seleccione un nivel</option>
                        <option value="1">1 - Bajo</option>
                        <option value="2">2 - Medio</option>
                        <option value="3">3 - Alto</option>
                        <option value="4">4 - Muy Alto</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="factor-6"><span class="icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></span>Impacto en resultados <span class="weight-badge">(15%)</span></label>
                    <select id="factor-6" required>
                        <option value="" disabled selected>Seleccione un nivel</option>
                        <option value="1">1 - Bajo</option>
                        <option value="2">2 - Medio</option>
                        <option value="3">3 - Alto</option>
                        <option value="4">4 - Muy Alto</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="factor-7"><span class="icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>Relaciones internas/externas <span class="weight-badge">(5%)</span></label>
                    <select id="factor-7" required>
                        <option value="" disabled selected>Seleccione un nivel</option>
                        <option value="1">1 - Bajo</option>
                        <option value="2">2 - Medio</option>
                        <option value="3">3 - Alto</option>
                        <option value="4">4 - Muy Alto</option>
                    </select>
                </div>

                <button type="submit" class="btn-calculate"><span class="icon"><svg viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 6h8M8 10h8M8 14h4"/></svg></span>Calcular Valuación</button>
            </form>
        </div>

        <div class="results" id="results" aria-live="polite">
            <div class="results-card">
                <h2><span class="icon"><svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg></span>Resultados</h2>
                <p class="puesto-name" id="resultPuesto"></p>
                <table>
                    <thead>
                        <tr>
                            <th>Factor</th>
                            <th>Peso</th>
                            <th>Nivel</th>
                            <th>Puntos</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody"></tbody>
                    <tfoot>
                        <tr>
                            <td colspan="3">Puntaje Total</td>
                            <td id="totalScore"></td>
                        </tr>
                    </tfoot>
                </table>
                <div class="classification" id="classification">
                    <div class="label">Clasificación</div>
                    <div class="band" id="bandLabel"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const factors = [
            { name: 'Responsabilidad', weight: 0.20 },
            { name: 'Complejidad del trabajo', weight: 0.15 },
            { name: 'Conocimientos y habilidades requeridos', weight: 0.15 },
            { name: 'Supervisión ejercida/recibida', weight: 0.10 },
            { name: 'Condiciones de trabajo', weight: 0.05 },
            { name: 'Toma de decisiones', weight: 0.15 },
            { name: 'Impacto en resultados', weight: 0.15 },
            { name: 'Relaciones internas/externas', weight: 0.05 }
        ];

        const levelLabels = { 1: 'Bajo', 2: 'Medio', 3: 'Alto', 4: 'Muy Alto' };

        var bandIcons = {
            'band-operativo': '<svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>',
            'band-profesional': '<svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 2 3 3 6 3s6-1 6-3v-5"/></svg>',
            'band-gerencial': '<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
            'band-directivo': '<svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'
        };

        function getBand(score) {
            if (score <= 1.75) return { name: 'Operativo', class: 'band-operativo' };
            if (score <= 2.50) return { name: 'Profesional', class: 'band-profesional' };
            if (score <= 3.25) return { name: 'Gerencial', class: 'band-gerencial' };
            return { name: 'Directivo', class: 'band-directivo' };
        }

        document.getElementById('valuationForm').addEventListener('submit', function(e) {
            e.preventDefault();

            var puestoName = document.getElementById('puestoName').value.trim();
            var tbody = document.getElementById('resultsBody');
            tbody.innerHTML = '';
            var total = 0;

            for (var i = 0; i < factors.length; i++) {
                var level = parseInt(document.getElementById('factor-' + i).value, 10);
                var points = level * factors[i].weight;
                total += points;

                var row = document.createElement('tr');
                row.innerHTML =
                    '<td>' + factors[i].name + '</td>' +
                    '<td>' + (factors[i].weight * 100) + '%</td>' +
                    '<td>' + level + ' - ' + levelLabels[level] + '</td>' +
                    '<td>' + points.toFixed(2) + '</td>';
                tbody.appendChild(row);
            }

            document.getElementById('resultPuesto').textContent = puestoName;
            document.getElementById('totalScore').textContent = total.toFixed(2);

            var band = getBand(total);
            var classificationEl = document.getElementById('classification');
            classificationEl.className = 'classification ' + band.class;
            var bandEl = document.getElementById('bandLabel');
            bandEl.innerHTML = '<span class="icon">' + bandIcons[band.class] + '</span>' + band.name;

            document.getElementById('results').classList.add('visible');
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
